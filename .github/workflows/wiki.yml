name: Sync wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Copy wiki pages (excluding README.md)
        run: |
          find wiki -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} wiki-repo/ \;

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync wiki from main"
          git push origin master
